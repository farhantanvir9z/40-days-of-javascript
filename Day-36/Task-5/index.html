<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script async src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script defer src="./script.js"></script>
  <title>Event listener cleanup</title>
</head>
<body class="bg-black min-h-screen flex items-center justify-center font-mono">

  <button id="open-btn" class="px-8 py-4 bg-white text-black font-black uppercase tracking-tighter rounded-2xl hover:bg-emerald-400 transition-all cursor-pointer active:scale-95 shadow-[0_0_20px_rgba(255,255,255,0.1)]">
    Open Dialog Box
  </button>

  <dialog id="myDialog" class="relative bg-zinc-950 border-2 border-emerald-500/50 p-0 rounded-3xl shadow-[0_0_50px_rgba(16,185,129,0.2)] backdrop:backdrop-blur-md overflow-hidden justify-self-center self-center">
    
    <div class="p-8 w-80 text-center space-y-6">
      <div class="text-emerald-400 font-black italic uppercase text-lg tracking-widest">
        System_Alert
      </div>
      
      <p class="text-zinc-400 text-sm leading-relaxed">
        This is a native dialog box. Press <span class="text-white font-bold">[ESC]</span> to close or use the button below.
      </p>

      <button id="close-btn" class="w-full py-3 bg-zinc-900 border border-zinc-800 text-zinc-400 hover:text-white hover:border-zinc-600 transition-all rounded-xl text-xs font-bold uppercase cursor-pointer">
        Close Dialog box
      </button>
    </div>

  </dialog>

</body>
</html>
