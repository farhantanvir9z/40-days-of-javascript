<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <script async src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script defer type="module" src="./main.js"></script>
  <title>Post page</title>
</head>
<body class="bg-zinc-950 min-h-screen w-full p-6 flex justify-center items-center text-white">
  
  <div class="relative w-full max-w-2xl group">

    <div class="absolute -inset-1 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-2xl blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
    
    <div class="relative bg-zinc-900 border border-zinc-800 rounded-xl p-4 shadow-2xl">
      <textarea 
        name="Post content" 
        id="postContent" 
        placeholder="What's happening?"
        class="w-full bg-transparent text-white text-xl md:text-2xl resize-none outline-none placeholder-zinc-600 leading-relaxed min-h-[160px]"
      ></textarea>
      
      <div class="flex items-center justify-center mt-4 pt-4 border-t border-zinc-800">

        <div class="flex items-center text-zinc-500 gap-4">
          <span id="charCount" class="text-sm font-medium tabular-nums">Characters typed: 0 </span>
          <button class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2 rounded-full font-bold text-sm transition-all active:scale-95 disabled:opacity-50">
            Post
          </button>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
