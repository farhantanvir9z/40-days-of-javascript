<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <script async src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script defer type="module" src="./main.js"></script>
  <title>debouncing</title>
</head>
<body class="bg-zinc-950 min-h-screen w-full p-6 flex justify-center items-center text-white font-sans">
  <div class="relative w-full max-w-2xl group">
    <!-- Background Glow -->
    <div class="absolute -inset-1 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-2xl blur opacity-25 group-hover:opacity-40 transition duration-1000"></div>
    
    <div class="relative bg-zinc-900 border border-zinc-800 rounded-xl p-6 shadow-2xl space-y-6">
      <!-- Search Header -->
      <div class="flex items-center gap-3 border-b border-zinc-800 pb-4">
        <div class="bg-indigo-500/10 p-2 rounded-lg">
          <svg class="w-6 h-6 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>
        <h1 class="text-xl font-bold tracking-tight">GitHub User Finder</h1>
      </div>

      <!-- Search Input -->
      <div class="relative">
        <input type="text" id="search-input" placeholder="Search by name..." 
          class="w-full bg-zinc-800 border border-zinc-700 text-white rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-zinc-500">
      </div>
      <!-- GitHub User Card -->
  <template id="tempUserCard">
    <div class="group relative w-full bg-zinc-900/50 border border-zinc-800 rounded-2xl p-5 flex flex-col sm:flex-row items-center gap-6 transition-all hover:bg-zinc-900 hover:border-indigo-500/40">
  <!-- Avatar Section -->
  <div class="relative">
    <!-- Animated Glow on Hover -->
    <div class="absolute -inset-1 bg-gradient-to-tr from-indigo-500 to-purple-600 rounded-full blur opacity-0 group-hover:opacity-40 transition duration-500"></div>
    <div class="relative size-26 flex flex-col items-center justify-center gap-y-1 rounded-full bg-zinc-800 shadow-2xl overflow-hidden">
      <div class="rounded-full bg-gray-600 size-8 shadow-inner"></div>
      <div class="rounded-t-full bg-gray-600 w-14 h-8 shadow-inner"></div>
    </div>
  </div>

  <!-- Content Section -->
  <div class="flex-1 text-center sm:text-left space-y-3 overflow-hidden">
    <div>
      <h2 id="name" class="text-2xl font-bold text-white group-hover:text-indigo-400 transition-colors truncate">
      </h2>
      <p class="text-zinc-500 text-sm leading-relaxed line-clamp-2 italic">
      </p>
    </div>

    <!-- Stats Badges -->
    <div class="flex flex-wrap justify-center sm:justify-start gap-2">
      <span id="publicRepoes" class="bg-zinc-800/80 text-zinc-300 text-[9px] font-bold px-3 py-1 rounded-full border border-zinc-700/50 uppercase tracking-wider">
      </span>
      <span id="followers" class="bg-indigo-500/10 text-indigo-400 text-[9px] font-bold px-3 py-1 rounded-full border border-indigo-500/20 uppercase tracking-wider">
      </span>
    </div>
  </div>

  <!-- Action Button -->
  <button class="w-full sm:w-auto px-6 py-2.5 bg-zinc-800 hover:bg-indigo-600 text-white text-sm font-semibold rounded-xl border border-zinc-700 hover:border-indigo-400 transition-all active:scale-95 whitespace-nowrap">
    View Profile
  </button>
</div>
  </template>
      <!--Skeleton animation-->
    <div id="skeleton-loading" class="w-full bg-zinc-900/30 border border-zinc-800/50 rounded-2xl p-5 flex flex-col sm:flex-row items-center gap-6 animate-pulse hidden">
  
  <!-- Avatar Skeleton -->
  <div class="h-24 w-24 bg-zinc-800 rounded-full flex-shrink-0"></div>
  
  <!-- Content Skeleton -->
  <div class="flex-1 w-full space-y-4">
    <div class="h-6 bg-zinc-800 rounded-md w-1/3 mx-auto sm:mx-0"></div>
    
    <div class="space-y-2">
      <div class="h-3 bg-zinc-800 rounded w-full"></div>
      <div class="h-3 bg-zinc-800 rounded w-2/3 mx-auto sm:mx-0"></div>
    </div>

    <!-- Badges Skeleton -->
    <div class="flex justify-center sm:justify-start gap-2">
      <div class="h-6 bg-zinc-800 rounded-full w-24"></div>
      <div class="h-6 bg-zinc-800 rounded-full w-20"></div>
    </div>
  </div>

  <!-- Button Skeleton -->
  <div class="h-10 bg-zinc-800 rounded-xl w-full sm:w-28 flex-shrink-0"></div>
</div>

      <!-- Results Area -->
      <div id="results-container" class="min-h-[140px] flex flex-col gap-10 items-center justify-center">
        
      </div>
  </div> 
  </div>
</body>

</html>
