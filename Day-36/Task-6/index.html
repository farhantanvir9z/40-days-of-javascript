<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script async src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script defer type="module" src="./script.js"></script>
  <title>High-Perf List Rendering</title>
</head>
<body class="bg-zinc-950 min-h-screen w-full p-4 md:p-10 flex justify-center items-center text-white font-sans">
  
  <div class="relative w-full max-w-3xl group">
    <div class="absolute -inset-1 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-2xl blur opacity-20 transition duration-1000"></div>
    
    <div class="relative bg-zinc-900 border border-zinc-800 rounded-xl shadow-2xl overflow-hidden flex flex-col h-[80vh]">
      
      <div class="p-6 border-b border-zinc-800 bg-zinc-900/50 backdrop-blur-md">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
          <h1 class="text-xl font-bold tracking-tight flex items-center gap-2">
            <span class="w-2 h-6 bg-indigo-500 rounded-full"></span>
            Data Processor <span class="text-zinc-500 font-normal text-sm">(1,000 Items)</span>
          </h1>
          <div class="flex justify-between gap-2">
            <button id="Ascending-sort-btn" class="px-3 py-1.5 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-lg text-xs font-semibold transition-all cursor-pointer">Sort A-Z</button>
            <button id="descending-sort-btn" class="px-3 py-1.5 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-lg text-xs font-semibold transition-all cursor-pointer">Sort Z-A</button>
            <button id="shuffle-btn" class="px-4 py-1.5 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-xs font-semibold transition-all cursor-pointer">Shuffle</button>
          </div>
          <div class="relative">
            <input type="text" id="filter-input" placeholder="Filter items..." class="w-full bg-zinc-800 border border-zinc-700 text-white rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-zinc-500">
          </div>
        </div>
      </div>

      <div class="flex-1 overflow-y-auto p-4 custom-scrollbar" id="list-viewport">
        <ul class="grid grid-cols-1 gap-3" id="main-list">
        </ul>
</div>

      <div class="p-3 px-6 bg-zinc-950 border-t border-zinc-800 flex justify-between items-center">
        <div class="flex items-center gap-4">
          <div class="flex items-center gap-1.5">
            <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
            <span class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold">System Ready</span>
          </div>
          <span id="item-count" class="text-xs text-zinc-400 font-mono">Items: 1000</span>
        </div>
        <div class="font-mono text-[11px] text-indigo-400 bg-indigo-500/10 px-2 py-1 rounded">
          Last Render: <span id="perf-timer">0.00</span>ms
        </div>
      </div>

    </div>
    
  </div>
</body>
</html>
