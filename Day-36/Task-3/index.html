<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <script async src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script defer type="module" src="./main.js"></script>
  <title>Memoizing</title>
</head>
<body class="bg-zinc-950 min-h-screen w-full p-6 flex justify-center items-center text-white">
  
  <div class="relative w-full max-w-2xl group">

    <div class="absolute -inset-1 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-2xl blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
    <div class="relative bg-zinc-900 border border-zinc-800 rounded-xl p-4 shadow-2xl text-center space-y-5">
      
      <form id="form" class="flex flex-col sm:flex-row gap-3">
        <input type="number" placeholder="Enter Celsius" id="celsius" class="w-full bg-zinc-800 border border-zinc-700 text-white rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all placeholder:text-zinc-500" required>
        <button type="submit" class="convert bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-medium px-6 py-3 rounded-lg transition-all active:scale-95 shadow-lg">Convert</button>
      </form>

      <p id="show-fahrenheit" class="text-lg md:text-2xl">0°F</p>
      <p id="show-count" class="text-lg md:text-2xl">Function count: 0</p>
    </div>
  </div>

</body>
</html>
